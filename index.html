<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Interactive ischemic heart disease learning lab covering coronary physiology, chronic coronary syndromes, acute coronary syndromes, myocardial infarction, ECG localization, complications, flashcards, and clinical cases.">
  <meta name="theme-color" content="#082f49">
  <title>Ischemic Heart Lab | Interactive Cardiology</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Course navigation">
      <div class="brand-panel">
        <a class="brand" href="#overview" data-route="overview" aria-label="Ischemic Heart Lab home">
          <span class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 72 72"><path d="M36 61C20 50 10 41 10 27c0-8 6-14 14-14 5 0 10 3 12 8 3-5 7-8 13-8 8 0 14 6 14 14 0 14-11 23-27 34Z" fill="none" stroke="currentColor" stroke-width="4"/><path d="M14 37h12l5-13 7 26 7-20 5 9h9" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span><strong>Ischemic Heart Lab</strong><small>Mechanism → diagnosis → action</small></span>
        </a>
        <button class="icon-button sidebar-close" id="sidebar-close" type="button" aria-label="Close navigation">×</button>
      </div>
      <nav id="course-nav" class="course-nav" aria-label="Connected study map"></nav>
      <div class="sidebar-progress">
        <div class="progress-copy"><span>Visited modules</span><strong id="progress-label">1 / 18</strong></div>
        <div class="progress-track" aria-hidden="true"><span id="progress-bar"></span></div>
        <div class="sidebar-actions">
          <button class="text-button" id="reset-progress" type="button">Reset progress</button>
          <button class="text-button" id="clear-bookmarks" type="button">Clear bookmarks</button>
        </div>
      </div>
    </aside>

    <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

    <div class="workspace">
      <header class="topbar">
        <button class="icon-button menu-button" id="menu-button" type="button" aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false">☰</button>
        <div class="topbar-title"><span class="pulse-dot" aria-hidden="true"></span><span id="current-section-label">Overview</span></div>
        <div class="topbar-actions">
          <label class="search-box" for="site-search"><span aria-hidden="true">⌕</span><input id="site-search" type="search" placeholder="Search ECG, troponin, drugs, complications…" autocomplete="off"><kbd>/</kbd></label>
          <button class="icon-button" id="bookmarks-button" type="button" aria-label="Open bookmarks" title="Bookmarks">★</button>
          <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">◐</button>
          <div class="voice-status" id="voice-pill" title="Text-to-speech voice"><span aria-hidden="true">◉</span><span id="voice-status">Loading voice…</span></div>
          <label class="rate-control" for="speech-rate"><span>Voice</span><select id="speech-rate" aria-label="Speech rate"><option value="0.82">0.82×</option><option value="0.92" selected>0.92×</option><option value="1">1×</option><option value="1.1">1.1×</option><option value="1.2">1.2×</option></select></label>
          <button class="icon-button" id="stop-speech" type="button" aria-label="Stop speech" title="Stop speech">■</button>
          <button class="icon-button" id="print-button" type="button" aria-label="Print current module" title="Print current module">⎙</button>
        </div>
        <div class="search-results" id="search-results" role="listbox" aria-label="Search results" hidden></div>
      </header>

      <main id="main-content" tabindex="-1"><div id="app-content" aria-live="polite"></div></main>

      <footer class="site-footer"><p><strong>Ischemic Heart Lab</strong> is an educational study aid. It does not replace urgent clinical assessment, local protocols, or specialist judgement.</p><button class="text-button" data-route="sources" type="button">Source, scope, and references</button></footer>
    </div>
  </div>

  <dialog class="bookmark-dialog" id="bookmark-dialog">
    <div class="dialog-head"><div><p class="eyebrow">Saved for revision</p><h2>Bookmarks</h2></div><button class="icon-button" id="close-bookmarks" type="button" aria-label="Close bookmarks">×</button></div>
    <div id="bookmark-list"></div>
  </dialog>
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
